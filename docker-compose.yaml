services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INNGEST_APP_ID: ${INNGEST_APP_ID}
        POLAR_SERVER: ${POLAR_SERVER}
        POLAR_SUCCESS_URL: ${POLAR_SUCCESS_URL}
    environment:
      - INNGEST_BASE_URL=http://inngest:8288
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped

  inngest:
    image: inngest/inngest:v0.27.0
    command: 'inngest dev -u http://app:3000/api/inngest'
    ports:
      - '8288:8288'

  redis:
    image: redis:8.4.0
    ports:
      - "6379:6379"
    restart: unless-stopped